<nav class="navbar navbar-expand-lg navbar-light">
  <div class="container">
    <a routerLink="/shop" class="navbar-brand" (click)="closeNav()">
      <img src="favicon.ico" alt="Souqna" class="logo" />
      <i class="text-white">Souqna</i>
    </a>

    <button class="navbar-toggler" type="button" aria-label="Toggle navigation" (click)="isCollapsed = !isCollapsed">
      <span class="navbar-toggler-icon"></span>
    </button>

    <div class="collapse navbar-collapse" [ngClass]="{ show: !isCollapsed }">
      <!-- Public Navigation / Common links -->
      <ul class="navbar-nav">
        <li class="nav-item" *ngFor="let link of navLinks">
          <a class="nav-link" [routerLink]="link.path" routerLinkActive="active"
            [routerLinkActiveOptions]="{ exact: !!link.exact }" (click)="closeNav()">
            {{ link.label }}
          </a>
        </li>

        <!-- Before login: Login & Register as top-level links -->
        <li class="nav-item" *ngIf="!isLoggedIn">
          <a class="nav-link" routerLink="/login" routerLinkActive="active" (click)="closeNav()">Login</a>
        </li>
        <li class="nav-item" *ngIf="!isLoggedIn">
          <a class="nav-link" routerLink="/register" routerLinkActive="active" (click)="closeNav()">Register</a>
        </li>

        <!-- Customer: show Cart as top-level, keep Orders/Profile inside account dropdown -->
        <li class="nav-item" *ngIf="isLoggedIn && userRole === UserRole.Customer">
          <a routerLink="/cart" class="nav-link" routerLinkActive="active" (click)="closeNav()">Cart</a>
        </li>

        <!-- Seller: show main seller links as top-level -->
        <ng-container *ngIf="isLoggedIn && userRole === UserRole.Seller">
          <li class="nav-item" *ngFor="let s of sellerLinks">
            <a class="nav-link" [routerLink]="s.path" routerLinkActive="active" (click)="closeNav()">{{ s.label }}</a>
          </li>
          <li class="nav-item">
            <a class="nav-link text-danger" href="#" (click)="logout(); $event.preventDefault()">Logout</a>
          </li>
        </ng-container>

        <!-- Admin: show main admin links as top-level -->
        <ng-container *ngIf="isLoggedIn && userRole === UserRole.Admin">
          <li class="nav-item" *ngFor="let a of adminLinks">
            <a class="nav-link" [routerLink]="a.path" routerLinkActive="active" (click)="closeNav()">{{ a.label }}</a>
          </li>
          <li class="nav-item">
            <a class="nav-link text-danger" href="#" (click)="logout(); $event.preventDefault()">Logout</a>
          </li>
        </ng-container>
      </ul>

      <form class="form-inline mx-auto" (ngSubmit)="onHeaderSearch($event)">
        <div class="input-group">
          <input type="search" class="form-control" name="headerSearch" [(ngModel)]="headerSearch"
            placeholder="Search for products, brands and more" />
          <div class="input-group-append">
            <button class="btn btn-outline-secondary" type="submit" aria-label="Search">
              <i class="material-icons">search</i>
            </button>
          </div>
        </div>
      </form>

      <ul class="navbar-nav ms-auto align-items-center">
        <!-- Customer Cart Icon -->
        <li class="nav-item" *ngIf="isLoggedIn && userRole === UserRole.Customer">
          <a routerLink="/cart" class="nav-link" (click)="closeNav()" aria-label="Shopping cart">
            <i class="material-icons">shopping_cart</i>
          </a>
        </li>

        <!-- User Account Menu -->
        <li class="nav-item dropdown">
          <a class="nav-link" href="#" role="button" aria-haspopup="true" [attr.aria-expanded]="accountDropdownVisible"
            (click)="$event.preventDefault(); toggleAccountDropdown()">
            <i class="material-icons">account_circle</i>
          </a>
          <div class="dropdown-menu dropdown-menu-end" [ngClass]="{ show: accountDropdownVisible }">
            <!-- User Info -->
            <div *ngIf="isLoggedIn" class="dropdown-header">
              <div class="d-flex align-items-center justify-content-between">
                <div>{{ displayName }}</div>
                <span *ngIf="displayRole" class="badge bg-primary text-uppercase ms-2">{{ displayRole }}</span>
              </div>
              <small class="text-muted">{{ displayEmail }}</small>
            </div>
            <div *ngIf="isLoggedIn" class="dropdown-divider"></div>

            <!-- Customer Profile -->
            <a *ngIf="isLoggedIn && userRole === UserRole.Customer" routerLink="/profile" class="dropdown-item"
              (click)="closeNav()">
              Profile <i class="fa fa-user"></i>
            </a>

            <a *ngIf="isLoggedIn && userRole === UserRole.Customer" routerLink="/orders" class="dropdown-item"
              (click)="closeNav()">
              Orders <i class="fa fa-list"></i>
            </a>

            <!-- Seller Profile -->
            <a *ngIf="isLoggedIn && userRole === UserRole.Seller" routerLink="/seller/profile" class="dropdown-item"
              (click)="closeNav()">
              Profile <i class="fa fa-user"></i>
            </a>

            <!-- Logout -->
            <a *ngIf="isLoggedIn" href="#" class="dropdown-item" (click)="logout(); $event.preventDefault()">
              Logout <i class="fa fa-sign-out"></i>
            </a>

            <!-- Not Logged In -->
            <div *ngIf="!isLoggedIn">
              <a class="dropdown-item" routerLink="/register" (click)="closeNav()">
                Register <i class="fa fa-user-plus"></i>
              </a>
              <a class="dropdown-item" routerLink="/login" (click)="closeNav()">
                Login <i class="fa fa-sign-in"></i>
              </a>
            </div>
          </div>
        </li>
      </ul>
    </div>
  </div>
</nav>
