<nav class="navbar navbar-expand-lg navbar-light">
  <div class="container">
    <a routerLink="/shop" class="navbar-brand" (click)="closeNav()">
      <img src="favicon.ico" alt="TechNest" class="logo" />
      <i class="text-white">TechNest</i>
    </a>

    <button
      class="navbar-toggler"
      type="button"
      aria-label="Toggle navigation"
      (click)="isCollapsed = !isCollapsed">
      <span class="navbar-toggler-icon"></span>
    </button>

    <div class="collapse navbar-collapse" [ngClass]="{ show: !isCollapsed }">
      <ul class="navbar-nav">
        <li class="nav-item" *ngFor="let link of navLinks">
          <a
            class="nav-link"
            [routerLink]="link.path"
            routerLinkActive="active"
            [routerLinkActiveOptions]="{ exact: !!link.exact }"
            (click)="closeNav()">
            {{ link.label }}
          </a>
        </li>
      </ul>

      <form class="form-inline mx-auto" (ngSubmit)="onHeaderSearch($event)">
        <div class="input-group">
          <input
            type="search"
            class="form-control"
            name="headerSearch"
            [(ngModel)]="headerSearch"
            placeholder="Search for products, brands and more" />
          <div class="input-group-append">
            <button class="btn btn-outline-secondary" type="submit" aria-label="Search">
              <i class="material-icons">search</i>
            </button>
          </div>
        </div>
      </form>

      <ul class="navbar-nav ms-auto align-items-center">
        <li class="nav-item">
          <a routerLink="/shop" class="nav-link" (click)="closeNav()" aria-label="Shopping cart">
            <i class="material-icons">shopping_cart</i>
          </a>
        </li>

        <li class="nav-item dropdown">
          <a
            class="nav-link"
            href="#"
            role="button"
            aria-haspopup="true"
            [attr.aria-expanded]="dropdownVisible"
            (click)="$event.preventDefault(); toggleDropdown()">
            <i class="material-icons">account_circle</i>
          </a>
          <div class="dropdown-menu dropdown-menu-end" [ngClass]="{ show: dropdownVisible }">
            <a class="dropdown-item" href="#" (click)="$event.preventDefault()">
              Register <i class="fa fa-user-plus"></i>
            </a>
            <a class="dropdown-item" href="#" (click)="$event.preventDefault()">
              Login <i class="fa fa-sign-in"></i>
            </a>
            <a class="dropdown-item" href="#" (click)="$event.preventDefault()">My Order</a>
          </div>
        </li>
      </ul>
    </div>
  </div>
</nav>
