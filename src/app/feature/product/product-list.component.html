<div class="container mt-4">
  <div class="d-flex justify-content-between align-items-center mb-3">
    <h2>Products</h2>
    <a class="btn btn-primary" [routerLink]="['/products/new']">Add Product</a>
  </div>

  <div *ngIf="isLoading" class="alert alert-info">
    Loading products...
  </div>

  <div *ngIf="errorMessage && !isLoading" class="alert alert-danger">
    {{ errorMessage }}
  </div>

  <table *ngIf="!isLoading && !errorMessage" class="table table-striped align-middle" aria-label="Products table">
    <thead>
      <tr>
        <th scope="col">#</th>
        <th scope="col">Image</th>
        <th scope="col">Name</th>
        <th scope="col">Price</th>
        <th scope="col">Old price</th>
        <th scope="col">Category</th>
        <th scope="col" class="text-end">Actions</th>
      </tr>
    </thead>
    <tbody>
      <tr *ngFor="let product of products">
        <th scope="row">{{ product.id }}</th>
        <td>
          <div class="d-flex gap-1 flex-wrap" *ngIf="product.imageUrls.length > 0; else noThumb">
            <img *ngFor="let imageUrl of product.imageUrls" [src]="imageUrl" [alt]="product.name"
              class="product-thumb" />
          </div>
          <ng-template #noThumb>
            <span class="text-muted small">—</span>
          </ng-template>
        </td>
        <td>{{ product.name }}</td>
        <td>{{ product.displayPrice | number: '1.2-2' }}</td>
        <td>{{ product.oldPrice | number: '1.2-2' }}</td>
        <td>{{ product.categoryName }}</td>
        <td class="text-end">
          <a class="btn btn-sm btn-outline-secondary me-2" [routerLink]="['/products', product.id, 'edit']">
            Edit
          </a>
          <button type="button" class="btn btn-sm btn-outline-danger" (click)="onDeleteRequest(product.id)">
            Delete
          </button>
        </td>
      </tr>
      <tr *ngIf="products.length === 0">
        <td colspan="7" class="text-center text-muted">No products found.</td>
      </tr>
    </tbody>
  </table>
</div>
