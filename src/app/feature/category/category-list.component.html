<div class="container mt-4">
  <div class="d-flex justify-content-between align-items-center mb-3">
    <h2>Categories</h2>
    <a class="btn btn-primary" [routerLink]="['/categories/new']">Add Category</a>
  </div>

  <div *ngIf="isLoading" class="alert alert-info">
    Loading categories...
  </div>

  <div *ngIf="errorMessage && !isLoading" class="alert alert-danger">
    {{ errorMessage }}
  </div>

  <table *ngIf="!(isLoading) && !(errorMessage)" class="table table-striped" aria-label="Categories table">
    <thead>
      <tr>
        <th scope="col">#</th>
        <th scope="col">Name</th>
        <th scope="col">Description</th>
        <th scope="col" class="text-end">Actions</th>
      </tr>
    </thead>
    <tbody>
      <tr *ngFor="let category of categories">
        <th scope="row">{{ category.id }}</th>
        <td>{{ category.name }}</td>
        <td>{{ category.description }}</td>
        <td class="text-end">
          <a class="btn btn-sm btn-outline-secondary me-2" [routerLink]="['/categories', category.id, 'edit']">
            Edit
          </a>
          <button type="button" class="btn btn-sm btn-outline-danger" (click)="onDeleteCategory(category.id)">
            Delete
          </button>
        </td>
      </tr>
      <tr *ngIf="categories.length === 0">
        <td colspan="4" class="text-center text-muted">No categories found.</td>
      </tr>
    </tbody>
  </table>
</div>
