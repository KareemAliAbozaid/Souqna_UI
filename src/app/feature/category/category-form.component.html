<div class="container mt-4">
  <h2 class="mb-3">
    {{ isEditMode ? 'Edit Category' : 'Add Category' }}
  </h2>

  <div *ngIf="isLoading" class="alert alert-info">
    Loading category...
  </div>

  <div *ngIf="errorMessage && !isLoading" class="alert alert-danger">
    {{ errorMessage }}
  </div>

  <form [formGroup]="form" (ngSubmit)="onSubmit()" novalidate>
    <div class="mb-3">
      <label for="name" class="form-label">Name</label>
      <input id="name" type="text" class="form-control" formControlName="name" />
      <div *ngIf="name?.invalid && (name?.dirty || name?.touched)" class="text-danger mt-1">
        Name is required.
      </div>
    </div>

    <div class="mb-3">
      <label for="description" class="form-label">Description</label>
      <textarea id="description" rows="3" class="form-control" formControlName="description"></textarea>
      <div *ngIf="description?.invalid && (description?.dirty || description?.touched)" class="text-danger mt-1">
        Description is required.
      </div>
    </div>

    <div class="d-flex justify-content-end mt-3">
      <a class="btn btn-secondary me-2" [routerLink]="['/categories']">Cancel</a>
      <button type="submit" class="btn btn-primary" [disabled]="form.invalid || isSaving">
        {{ isSaving ? 'Saving...' : (isEditMode ? 'Update' : 'Create') }}
      </button>
    </div>
  </form>
</div>
