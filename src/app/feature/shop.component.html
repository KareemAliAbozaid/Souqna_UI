<div class="container-fluid shop-page py-4">
  <div class="row g-4">
    <aside class="col-lg-3">
      <div class="card shadow-sm">
        <div class="card-header fw-semibold">Categories</div>
        <div class="list-group list-group-flush">
          <button
            type="button"
            class="list-group-item list-group-item-action"
            [class.active]="shopParams.categoryId === 0"
            (click)="onCategorySelected(0)">
            All
          </button>
          <button
            type="button"
            class="list-group-item list-group-item-action"
            *ngFor="let category of categories"
            [class.active]="shopParams.categoryId === category.id"
            (click)="onCategorySelected(category.id)">
            {{ category.name }}
          </button>
        </div>
      </div>
    </aside>

    <section class="col-lg-9">
      <div *ngIf="isLoading" class="alert alert-info">Loading products...</div>

      <div *ngIf="errorMessage && !isLoading" class="alert alert-danger">
        {{ errorMessage }}
      </div>

      <div *ngIf="!isLoading && !errorMessage && products.length === 0" class="alert alert-warning">
        No products found.
      </div>

      <div *ngIf="!isLoading && !errorMessage && products.length > 0" class="shop-toolbar card shadow-sm mb-4">
        <div class="card-body">
          <div class="row align-items-center g-3">
            <div class="col-md-6">
              <span class="text-muted">Showing</span>
              <strong class="mx-1">{{ showingCount }}</strong>
              <span class="text-muted">of</span>
              <strong class="mx-1">{{ totalCount }}</strong>
            </div>

            <div class="col-md-6">
              <form class="d-flex gap-2 justify-content-md-end" (ngSubmit)="onSearch()">
                <input
                  type="search"
                  class="form-control form-control-sm"
                  placeholder="Search"
                  [(ngModel)]="searchTerm"
                  name="searchTerm" />
                <button type="submit" class="btn btn-danger btn-sm">Search</button>
                <button type="button" class="btn btn-dark btn-sm" (click)="onResetSearch()">Reset</button>
              </form>
            </div>
          </div>
        </div>
      </div>

      <div class="row g-4" *ngIf="!isLoading && !errorMessage && products.length > 0">
        <div class="col-md-6" *ngFor="let product of products">
          <div class="card h-100 product-card shadow-sm">
            <div class="product-image-wrap">
              <ng-container *ngIf="hasProductImages(product); else noImage">
                <img
                  [src]="getVisibleImages(product)[getActiveIndex(product.id)]"
                  class="card-img-top product-image"
                  [alt]="product.name"
                  (error)="onImageError(product.id, getActiveIndex(product.id))" />
                <button
                  *ngIf="getVisibleImages(product).length > 1"
                  type="button"
                  class="gallery-nav gallery-nav-prev"
                  (click)="prevImage(product)"
                  aria-label="Previous image">
                  ‹
                </button>
                <button
                  *ngIf="getVisibleImages(product).length > 1"
                  type="button"
                  class="gallery-nav gallery-nav-next"
                  (click)="nextImage(product)"
                  aria-label="Next image">
                  ›
                </button>
                <div *ngIf="getVisibleImages(product).length > 1" class="gallery-dots">
                  <button
                    type="button"
                    *ngFor="let url of getVisibleImages(product); let i = index"
                    class="gallery-dot"
                    [class.active]="getActiveIndex(product.id) === i"
                    (click)="setActiveImage(product.id, i)"
                    [attr.aria-label]="'Image ' + (i + 1)">
                  </button>
                </div>
              </ng-container>
              <ng-template #noImage>
                <div class="product-image-placeholder d-flex align-items-center justify-content-center text-muted">
                  No image
                </div>
              </ng-template>
            </div>
            <div class="card-body d-flex flex-column">
              <h5 class="card-title">{{ product.name }}</h5>
              <p class="card-text text-muted flex-grow-1">{{ product.description }}</p>
              <p class="fw-bold mb-3">${{ getProductPrice(product) | number: '1.2-2' }}</p>
              <div class="d-flex gap-2">
                <button type="button" class="btn btn-primary btn-sm">Add to Cart</button>
                <button type="button" class="btn btn-outline-secondary btn-sm">Details</button>
              </div>
            </div>
          </div>
        </div>
      </div>

      <nav
        *ngIf="!isLoading && !errorMessage && products.length > 0 && totalPages > 0"
        class="d-flex justify-content-center mt-4"
        aria-label="Product pagination">
        <ul class="pagination mb-0">
          <li class="page-item" [class.disabled]="shopParams.pageNumber === 1">
            <button type="button" class="page-link" (click)="onPageChanged(1)">First</button>
          </li>
          <li class="page-item" [class.disabled]="shopParams.pageNumber === 1">
            <button type="button" class="page-link" (click)="onPageChanged(shopParams.pageNumber - 1)">Previous</button>
          </li>
          <li
            class="page-item"
            *ngFor="let page of pages"
            [class.active]="page === shopParams.pageNumber">
            <button type="button" class="page-link" (click)="onPageChanged(page)">{{ page }}</button>
          </li>
          <li class="page-item" [class.disabled]="shopParams.pageNumber === totalPages">
            <button type="button" class="page-link" (click)="onPageChanged(shopParams.pageNumber + 1)">Next</button>
          </li>
          <li class="page-item" [class.disabled]="shopParams.pageNumber === totalPages">
            <button type="button" class="page-link" (click)="onPageChanged(totalPages)">Last</button>
          </li>
        </ul>
      </nav>
    </section>
  </div>
</div>
